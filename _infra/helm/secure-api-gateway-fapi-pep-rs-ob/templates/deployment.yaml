---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: fapi-pep-rs
    app.kubernetes.io/component: fapi-pep-rs
    app.kubernetes.io/instance: fapi-pep-rs
    app.kubernetes.io/name: pingid
    app.kubernetes.io/part-of: pingid
    tier: middle
  name: fapi-pep-rs
spec:
  replicas: {{ .Values.deployment.replicas }}
  strategy:
    type: {{ .Values.deployment.strategyType }}
    {{ if eq .Values.deployment.strategyType "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.deployment.rollingUpdate.maxUnavailable }}
    {{ end }}
  selector:
    matchLabels:
      app: fapi-pep-rs
      app.kubernetes.io/component: fapi-pep-rs
      app.kubernetes.io/instance: fapi-pep-rs
      app.kubernetes.io/name: pingid
      app.kubernetes.io/part-of: pingid
      tier: middle
  template:
    metadata:
      labels:
        app: fapi-pep-rs
        app.kubernetes.io/component: fapi-pep-rs
        app.kubernetes.io/instance: fapi-pep-rs
        app.kubernetes.io/name: pingid
        app.kubernetes.io/part-of: pingid
        tier: middle
    spec:
      affinity:
        {{- toYaml .Values.deployment.affinity | nindent 8 }}
      containers:
        - name: fapi-pep-rs
          image: {{ .Values.deployment.image.repo }}:{{ default .Chart.AppVersion .Values.deployment.image.tag }}
          imagePullPolicy: {{ .Values.deployment.image.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.deployment.containerPort }}
          readinessProbe:
            failureThreshold: {{ .Values.deployment.readinessProbe.failureThreshold }}
            httpGet:
              path: {{ .Values.deployment.readinessProbe.path }}
              port: {{ .Values.deployment.containerAdminPort }}
            initialDelaySeconds: {{ .Values.deployment.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.readinessProbe.periodSeconds }}
            successThreshold: {{ .Values.deployment.readinessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.deployment.readinessProbe.timeoutSeconds }}
          livenessProbe:
            failureThreshold: {{ .Values.deployment.livenessProbe.failureThreshold }}
            httpGet:
              path: {{ .Values.deployment.livenessProbe.path }}
              port: {{ .Values.deployment.containerAdminPort }}
            initialDelaySeconds: {{ .Values.deployment.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.livenessProbe.periodSeconds }}
            successThreshold: {{ .Values.deployment.livenessProbe.successThreshold }}
            timeoutSeconds: {{ .Values.deployment.livenessProbe.timeoutSeconds }}
          volumeMounts:
            - mountPath: {{ .Values.deployment.ig.instanceDir }}/secrets/truststore
              name: ig-ob-truststore
              readOnly: true
            - mountPath: {{ .Values.deployment.ig.instanceDir }}/secrets/open-banking
              name: ig-ob-signing-key
              readOnly: true
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - secretRef:
                name: rs-sapig-secrets
            - configMapRef:
                name: rs-sapig-deployment-config
            {{ if eq .Values.configmap.cloudType "FIDC" }}
            - configMapRef:
                name: ob-aic-deployment-config
            {{ end }}
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
      securityContext:
        runAsGroup: 0
        runAsUser: 11111
      tolerations:
        - effect: NoSchedule
          key: kubernetes.io/arch
          operator: Exists
      volumes:
        - name: ig-ob-truststore
          secret:
            optional: false
            secretName: ig-truststore-pem
            items:
              - key: ig-truststore.pem
                path: ig.ob.truststore.pem # - is not allowed in secret id
        - name: ig-ob-signing-key
          secret:
            optional: false
            secretName: ig-ob-signing-key