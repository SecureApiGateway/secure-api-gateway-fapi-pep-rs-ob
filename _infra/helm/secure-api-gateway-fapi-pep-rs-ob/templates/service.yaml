---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  type: ClusterIP
  ports:
    - name: {{ .Chart.Name }}
      port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
  selector:
    app: {{ .Chart.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-admin
  labels:
    app: {{ .Chart.Name }}
spec:
  type: ClusterIP
  ports:
    - name: {{ .Chart.Name }}-admin
      port: 8085
      targetPort: 8085
      protocol: TCP
  selector:
    app: {{ .Chart.Name }}
