---
authorizationServer:
  baseFqdn: "dev-cdk-ob.forgerock.financial"
  fqdn: "as-sapig.dev-cdk-ob.forgerock.financial"
  realm: "alpha"

identityPlatform:
  fqdn: "iam.dev-cdk-ob.forgerock.financial"
  type: "CDK"

resourceServer:
  fqdn: "rs-sapig.dev-cdk-ob.forgerock.financial"
  mtlsFqdn: "rs-mtls.sapig.dev-cdk-ob.forgerock.financial"
  gatewayDataRepoUri: "http://fapi-pep-rs-ob:80"
  # Base64-encoded values — use: echo -n 'your-value' | base64
  oauth2Client:
    id: "replace-me"
    secret: "replace-me"
  idm:
    user: "replace-me"
    password: "replace-me"
  agent:
    id: "replace-me"
    password: "replace-me"
  ob:
    signingKeystore:
      alias: "jwtsigner"
      path: "/secrets/open-banking/ig-ob-signing-key.p12"
      type: "PKCS12"
      kid: "zBlb3x2klab0COMzC5ROYxNo8n4"
      storepass: "replace-me"
      keypass: "replace-me"
    aspsp:
      orgId: "0015800001041REAAY"
      softwareId: "YZyyZHejcCGRrWkh3OfkLI"
    rcs:
      apiInternalSvc: "remote-consent-service"
      consentResponseJwtIssuer: "secure-open-banking-rcs"
      consentResponseJwtSigningKeyId: "rcs-jwt-signer"
      consentStoreUri: "http://remote-consent-service:8080/consent/store"
      uiInternalSvc: "remote-consent-service-user-interface"
    api:
      uri: "http://test-facility-bank:8080"
      internalSvc: "test-facility-bank"

mongodb:
  testFacility:
    username: "replace-me"
    password: "replace-me"
  consent:
    username: "replace-me"
    password: "replace-me"

aic:
  identityDefaultUserAuthenticationService: "PasswordGrant"
  identityGoogleSecretStoreName: "ESV"
  identityGoogleSecretStoreOAuth2CACertsSecretName: "esv-sapig-ob-am-oauth2-ca-certs"

deployment:
  # Affinity Configuration
  affinity: {}
  image:
    # repo and tag must be supplied at deploy time
    # repo:
    # tag:
    imagePullPolicy: Always
  # Config for the liveness probe
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 60
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 5
  # Config for the readiness probe
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 30
    periodSeconds: 30
    successThreshold: 1
    timeoutSeconds: 5
  # How many pods are to run in the deployment
  replicas: 1
  # Resource Requests and Limits
  resources:
    limits:
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "512Mi"
  rollingUpdate:
    maxSurge: "50%"
    maxUnavailable: "25%"
  strategyType: "RollingUpdate"

ingress:
  mtls:
    serverCertSecret: fapi-pep-rs-mtls-tls-cert
    clientCaSecret: fapi-pep-rs-mtls-ca-certs
  tls:
    serverCertSecret: fapi-pep-rs-tls-cert

service:
  port: 80
